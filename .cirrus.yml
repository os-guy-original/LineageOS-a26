env:
  CIRRUS_CLONE_DEPTH: 1

task:
  name: LineageOS A26 (essi) Build
  
  timeout_in: 6h

  compute_engine_instance:
    image_project: ubuntu-os-cloud
    image: family/ubuntu-2204-lts
    platform: linux
    cpu: 8
    memory: 32G
    disk: 200

  env:
    USE_CCACHE: 1
    CCACHE_DIR: /tmp/ccache
    CCACHE_EXEC: /usr/bin/ccache

  install_deps_script: |
    sudo apt-get update
    sudo apt-get upgrade -y
    sudo apt-get install -y \
      bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
      git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
      lib32readline-dev lib32z1-dev libdw-dev libelf-dev lz4 libsdl1.2-dev \
      libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
      squashfs-tools xsltproc zip zlib1g-dev openjdk-17-jdk

  configure_git_script: |
    git config --global user.email "228935929+os-guy-original@users.noreply.github.com"
    git config --global user.name "os-guy-original"

  setup_ccache_script: |
    ccache -M 50G
    ccache -z

  init_repo_script: |
    mkdir -p ~/lineage
    cd ~/lineage
    repo init --depth=1 --no-repo-verify --git-lfs \
      -u https://github.com/LineageOS/android.git \
      -b lineage-23.0

  sync_source_script: |
    cd ~/lineage
    mkdir -p .repo/local_manifests
    curl -o .repo/local_manifests/roomservice.xml \
      https://raw.githubusercontent.com/os-guy-original/LineageOS-a26/main/manifest/roomservice-a266b.xml
    repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

  build_rom_script: |
    cd ~/lineage
    source build/envsetup.sh
    brunch essi

  collect_artifacts_script: |
    mkdir -p ~/artifacts
    cd ~/lineage
    cp out/target/product/essi/recovery.img ~/artifacts/ 2>/dev/null || true
    cp out/target/product/essi/lineage-23.0-*-UNOFFICIAL-essi.zip ~/artifacts/ 2>/dev/null || true
    ls -la ~/artifacts/

  ccache_stats_script: |
    ccache -s

  artifacts:
    path: ~/artifacts/*
    type: application/octet-stream

